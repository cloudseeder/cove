<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- v0.4.29: PWA installability. The manifest makes Chrome on
         Android (and Safari on iOS 16.4+) treat this URL as an
         installable app — "Add to Home Screen" gets a real icon,
         standalone display, and a splash from the theme/background
         colors. The Apple-specific meta tags are still needed on
         iOS to actually launch full-screen from the home icon. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cove" />
    <link rel="apple-touch-icon" sizes="256x256" href="/icons/256.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/512.png" />

    <title>Cove</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>

    <!-- v0.4.29: register the service worker so the app shell caches
         + the PWA is installable. Skipped in dev (vite hot-reload + a
         service worker is a footgun). Failure is swallowed; SW
         registration not landing just means no offline launch. -->
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
