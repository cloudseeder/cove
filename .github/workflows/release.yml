# Cove client — multi-platform release build.
#
# Triggers on v*.*.* tag push (e.g. `git tag v0.2.0 && git push --tags`).
# Builds the Tauri desktop bundles on macOS / Windows / Linux in
# parallel via tauri-action, which also generates the `latest.json`
# updater feed entries from each bundle and attaches everything to a
# GitHub Release.
#
# Signing posture (slice 4b):
#
#   - TAURI_SIGNING_PRIVATE_KEY (+ password): REQUIRED. This signs the
#     updater bundle so installs verify against the pubkey baked into
#     tauri.conf.json. Without it, the updater channel cannot work —
#     the workflow will fail loud rather than ship un-updatable builds.
#
#   - APPLE_* + WINDOWS_CERTIFICATE_* are OPTIONAL. Absent → unsigned
#     macOS/Windows builds (Gatekeeper + SmartScreen warn on first
#     open; survivable for pilots). Present → signed + notarized macOS,
#     signed Windows. tauri-action picks them up from env without any
#     conditional logic on our side.
#
# How a release goes out, once you've set the secrets:
#
#   1. Bump version in clients/web/src-tauri/tauri.conf.json AND
#      clients/web/package.json (keep them in sync).
#   2. Commit, then `git tag v0.2.0 && git push --tags`.
#   3. This workflow opens a draft Release named "Cove v0.2.0",
#      attaches the three platform bundles + a signed latest.json,
#      and leaves it as DRAFT for you to review + publish.
#   4. Publish the Release. The updater endpoint
#      (https://github.com/<owner>/<repo>/releases/latest/download/latest.json)
#      now serves the new manifest; running Cove clients pick it up
#      on next checkForUpdate().

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual trigger so you can dry-run signing setup before tagging.
  # The dry-run skips Release publication.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish Release'
        type: boolean
        default: true

jobs:
  build-tauri:
    # tauri-action creates/updates a draft GitHub Release with the
    # built bundles. The default GITHUB_TOKEN has only read perms on
    # `contents`, so without this block the publish step fails with
    # "Resource not accessible by integration". Write is the minimum
    # needed; everything else stays at default-read.
    permissions:
      contents: write
    env:
      # cargo's HTTP/2 transport hits "Error in the HTTP2 framing layer"
      # downloading crates against static.crates.io on the GH ubuntu
      # runner — reproduced on v0.3.2 and v0.4.0 releases. Forcing
      # HTTP/1.1 fixes the framing errors; the retry knob covers the
      # remaining transient-network case.
      CARGO_HTTP_MULTIPLEXING: 'false'
      CARGO_NET_RETRY: '10'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary so a single .dmg covers Intel + Apple
          # Silicon. tauri-action handles the lipo step.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # macOS universal needs both architectures available to rustc.
      - name: Install Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # Linux WebView + the libsecret dep the keychain crate needs.
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev

      # Caches ~/.cargo/registry + the src-tauri target dir keyed on
      # Cargo.lock. Cold runs still hit crates.io but with the framing
      # workaround above; warm runs skip the registry fetch entirely
      # and shave several minutes off the build.
      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/web/src-tauri

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: clients/web/pnpm-lock.yaml

      - name: Install JS deps
        working-directory: clients/web
        run: pnpm install --frozen-lockfile

      # OS code-signing — conditionally exported.
      #
      # Critical subtlety: if we just YAML-forward `${{ secrets.X }}` as
      # env vars at the action level, an absent secret resolves to an
      # empty string and tauri-action treats "set to empty" as
      # "configured but malformed" → tries to import a 0-byte cert,
      # fails with `SecKeychainItemImport: parameters were not valid`.
      #
      # So: only write the signing env vars to $GITHUB_ENV when the
      # secret actually has content. Empty / unset → env var never
      # appears → tauri-action correctly does an unsigned build.
      - name: Configure Apple code-signing (only if secret present)
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          {
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Configure Windows code-signing (only if secret present)
        if: matrix.platform == 'windows-latest' && env.HAS_WIN_CERT == 'true'
        env:
          HAS_WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: bash
        run: |
          {
            echo "WINDOWS_CERTIFICATE=${{ secrets.WINDOWS_CERTIFICATE }}"
            echo "WINDOWS_CERTIFICATE_PASSWORD=${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Everything between "## [$TAG]" and the next "## [" header
          # (or EOF). Stripped of the "## [$TAG] — <date>" title line
          # itself since the release page already shows the version.
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG entry for $TAG — using fallback." >&2
            echo "See [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)." > /tmp/release-notes.md
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            cat /tmp/release-notes.md
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # === REQUIRED for updater channel ===
          # Generate locally with `pnpm tauri signer generate -w ~/.tauri/cove.key`.
          # Copy the private key contents into this secret; password into
          # the next one (set blank if you generated without a password).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # OS code-signing vars (Apple + Windows) come from $GITHUB_ENV
          # via the conditional steps above. Don't forward them here —
          # forwarding empty values defeats the whole point.
        with:
          projectPath: clients/web
          tagName: ${{ github.ref_name }}
          releaseName: 'Cove ${{ github.ref_name }}'
          releaseBody: |
            ${{ steps.notes.outputs.body }}

            ### Install notes
            - **macOS:** open the .dmg, drag Cove to Applications, launch.
              The build is signed with a Developer ID certificate and
              notarized — no Gatekeeper detour required.
            - **Windows:** unsigned in this release — SmartScreen → "More
              info" → "Run anyway" the first time. (Signing cert TBD.)
            - **Linux:** AppImage runs as-is (`chmod +x` if needed).

            Updates are cryptographically verified by the updater
            plugin against the pubkey baked into tauri.conf.json —
            independent of OS code-signing.
          # Always draft. You review the bundles + release notes before
          # publishing — once published, the updater feed serves it to
          # every running client on next check, which is not the kind
          # of thing you want behind a single 'git push --tags'.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
