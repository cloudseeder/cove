# Cove hub — Docker Compose runtime.
#
# Two services:
#   hub        — the always-on hub. Depends on state existing.
#   bootstrap  — one-shot ceremony for genesis state. Run once, then
#                MOVE keys/root.priv OFFLINE and never run again.
#
# Every host-facing knob is a variable so ONE compose file can run N
# hubs on the same host (personal testbed alongside a production hub,
# multiple pilots, etc.) without editing this file. See .env.example
# for defaults; either copy it to .env or pass the vars per-invocation:
#
#     COMPOSE_PROJECT_NAME=brooks COVE_HUB_PORT=8001 \
#       COVE_STATE_DIR=./testbed-state COVE_CONTAINER_NAME=cove-testbed \
#       docker compose --profile setup run --rm bootstrap \
#         --org-name "Testbed" --members brooks
#
# COMPOSE_PROJECT_NAME is the load-bearing one when running N hubs from
# ONE compose file: without a distinct project name per hub, Compose
# tracks them as the same service instance and any `docker compose up
# hub` silently destroys the other's container. See docker/README.md
# "Running a second hub on the same host" for the full walk-through.

services:
  hub:
    build: .
    image: cove-hub:latest
    # v0.4.64: container name is a variable so a second hub on the
    # same host can pick e.g. `cove-testbed` without editing this file.
    container_name: ${COVE_CONTAINER_NAME:-cove-hub}
    restart: unless-stopped
    ports:
      # Bind to loopback only by default — production runs behind a
      # reverse proxy that terminates TLS. Change the host side of the
      # port via COVE_HUB_PORT to avoid collisions when running a
      # second hub. Container side stays 8000 (that's what uvicorn
      # binds inside the image).
      - "127.0.0.1:${COVE_HUB_PORT:-8000}:8000"
    volumes:
      # Host path is a variable so a second hub can point at its own
      # state directory without touching this file.
      - ${COVE_STATE_DIR:-./cove-state}:/state
    environment:
      COVE_STATE_DIR: /state

  # One-shot genesis ceremony. Runs scripts/bootstrap_pilot.py with
  # any args you pass after the service name:
  #     docker compose --profile setup run --rm bootstrap \
  #         --org-name X --members Y,Z
  # After the ceremony finishes, this service does not run again.
  bootstrap:
    build: .
    image: cove-hub:latest
    profiles: ["setup"]
    volumes:
      # Bootstrap writes into the same state directory the hub reads.
      - ${COVE_STATE_DIR:-./cove-state}:/state
    environment:
      COVE_STATE_DIR: /state
    entrypoint: ["python", "scripts/bootstrap_pilot.py", "--state-dir", "/state"]
